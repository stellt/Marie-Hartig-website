    .shop-header h1 {

      font-size: clamp(1.6rem, 3vw, 3rem); letter-spacing: 0.2em;
      text-transform: uppercase; color: #111; margin: 0 0 0.6rem;

    .shop-rule { width: 40px; height: 1px; background: #bbb; margin: 1.2rem auto; }
    .prints-coming-soon {

<body class="worlds-page shop-page">
  <nav class="nav" aria-label="Main navigation">
    <a class="nav-logo" href="../index.html">Marie's Painted Worlds</a>
    <ul class="nav-links">
      <li><a href="meet-marie.html">Meet Marie</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="process.html">Process</a></li>
      <li><a href="contact.html">Connect</a></li>
      <li>
