backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/portfolio"
public_folder: "../assets/images/portfolio"

site_url: https://frabjous-macaron-e37dd0.netlify.app
display_url: https://frabjous-macaron-e37dd0.netlify.app

collections:

  # ── PORTFOLIO PAGE ──────────────────────────────────────────
  - name: "portfolio"
    label: "Portfolio Collections"
    label_singular: "Collection"
    folder: "_collections"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - label: "Collection Title"
        name: "title"
        widget: "string"
        hint: "e.g. Urban Infinity Pool"

      - label: "Collection Number"
        name: "number"
        widget: "number"
        hint: "Used for ordering on the portfolio page"

      - label: "Folder Name"
        name: "folder"
        widget: "string"
        hint: "Exact folder name in assets/images/portfolio/ e.g. 01 URBAN INFINITY POOL"

      - label: "Thumbnail Image"
        name: "thumbnail"
        widget: "image"
        hint: "The image shown on the portfolio grid"

      - label: "Collection Images"
        name: "images"
        widget: "list"
        label_singular: "Image"
        summary: "{{fields.image}}"
        field:
          label: "Image"
          name: "image"
          widget: "image"

      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Short description shown on the collection page"

      - label: "Location"
        name: "location"
        widget: "string"
        required: false

      - label: "Year"
        name: "year"
        widget: "string"
        required: false

      - label: "Type"
        name: "type"
        widget: "string"
        required: false

  # ── MEET MARIE PAGE ─────────────────────────────────────────
  - name: "pages"
    label: "Page Text"
    files:

      - label: "Meet Marie"
        name: "meet-marie"
        file: "_content/meet-marie.json"
        fields:
          - label: "Page Title"
            name: "heading"
            widget: "string"
            default: "Meet Marie"

          - label: "Portrait Photo"
            name: "portrait"
            widget: "image"
            media_folder: "/assets/images"
            public_folder: "../assets/images"

          - label: "Bio Text"
            name: "bio"
            widget: "list"
            label_singular: "Paragraph"
            summary: "{{fields.paragraph}}"
            field:
              label: "Paragraph"
              name: "paragraph"
              widget: "text"

      - label: "Contact / Connect"
        name: "contact"
        file: "_content/contact.json"
        fields:
          - label: "Heading"
            name: "heading"
            widget: "string"
            default: "Connect"

          - label: "Instagram Handle"
            name: "instagram_handle"
            widget: "string"

          - label: "Instagram URL"
            name: "instagram_url"
            widget: "string"

          - label: "Facebook URL"
            name: "facebook_url"
            widget: "string"

          - label: "Email Address"
            name: "email"
            widget: "string"

          - label: "Portrait Photo"
            name: "portrait"
            widget: "image"
            media_folder: "/assets/images"
            public_folder: "../assets/images"

      - label: "Home / About Page"
        name: "about"
        file: "_content/about.json"
        fields:
          - label: "Newsletter Popup Heading"
            name: "popup_heading"
            widget: "string"
            default: "Notes from Marie's Studio"

          - label: "Newsletter Popup Body Text"
            name: "popup_body"
            widget: "text"
            default: "Subscribe to receive notes from Marie Hartig's studio — glimpses of works in progress, stories behind each piece, and the inspirations that shape her murals and canvases."

          - label: "Newsletter Button Text"
            name: "popup_button"
            widget: "string"
            default: "Subscribe"

      - label: "Shop — Wall Tattoos"
        name: "shop-tattoos"
        file: "_content/shop-tattoos.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
            default: "Wall Tattoos"

          - label: "Price per Tattoo (€)"
            name: "price"
            widget: "number"
            value_type: "float"
            default: 45.00

          - label: "Tattoos"
            name: "tattoos"
            widget: "list"
            label_singular: "Tattoo"
            summary: "{{fields.name}}"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
                hint: "e.g. Wall Tattoo 1"
              - label: "Image"
                name: "image"
                widget: "image"
                media_folder: "/assets/images/wall tattoos no bg"
                public_folder: "../assets/images/wall tattoos no bg"
              - label: "Price (€)"
                name: "price"
                widget: "number"
                value_type: "float"

      - label: "Shop — Art Prints"
        name: "shop-prints"
        file: "_content/shop-prints.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
            default: "Art Prints"

          - label: "Default Price per Print (€)"
            name: "price"
            widget: "number"
            value_type: "float"
            default: 35.00

          - label: "Prints"
            name: "prints"
            widget: "list"
            label_singular: "Print"
            summary: "{{fields.name}}"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
                hint: "e.g. Celosia"
              - label: "Image"
                name: "image"
                widget: "image"
                media_folder: "/assets/images/wall stickers"
                public_folder: "../assets/images/wall stickers"
              - label: "Price (€)"
                name: "price"
                widget: "number"
                value_type: "float"

      - label: "Shop — Wallpapers"
        name: "shop-wallpapers"
        file: "_content/shop-wallpapers.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
            default: "Wallpapers"

          - label: "Default Price per Wallpaper (€)"
            name: "price"
            widget: "number"
            value_type: "float"
            default: 120.00

          - label: "Wallpapers"
            name: "wallpapers"
            widget: "list"
            label_singular: "Wallpaper"
            summary: "{{fields.name}}"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
                hint: "e.g. Wallpaper 1"
              - label: "Image"
                name: "image"
                widget: "image"
                media_folder: "/assets/images/wallpapers"
                public_folder: "../assets/images/wallpapers"
              - label: "Price (€)"
                name: "price"
                widget: "number"
                value_type: "float"

      - label: "Opening Page Slideshow"
        name: "slideshow-opening"
        file: "_content/slideshow-opening.json"
        fields:
          - label: "Slides"
            name: "slides"
            widget: "list"
            label_singular: "Slide"
            summary: "{{fields.image}}"
            field:
              label: "Image"
              name: "image"
              widget: "image"
              media_folder: "/assets/images/portfolio/01 OPENING PAGE"
              public_folder: "../assets/images/portfolio/01 OPENING PAGE"

      - label: "Home Page Slideshow"
        name: "slideshow-home"
        file: "_content/slideshow-home.json"
        fields:
          - label: "Slides"
            name: "slides"
            widget: "list"
            label_singular: "Slide"
            summary: "{{fields.image}}"
            field:
              label: "Image"
              name: "image"
              widget: "image"
              media_folder: "/assets/images/portfolio/02 HOME PAGE"
              public_folder: "../assets/images/portfolio/02 HOME PAGE"
