<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connect — Marie Hartig Studio" />
  <title>Connect — Marie Hartig Studio</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/worlds.css" />
  <link rel="stylesheet" href="../css/connect.css" />
  <link rel="stylesheet" href="../css/cart.css" />
</head>
<body class="worlds-page connect-page">

  <!-- NAVIGATION -->
  <nav class="nav" aria-label="Main navigation">
    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <span class="nav-toggle-bar"><span></span><span></span><span></span></span>
    </button>
    <a class="nav-logo" href="../index.html">Marie's Painted Worlds</a>
    <ul class="nav-links">
      <li><a href="about-marie.html">About Marie</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="process.html">Process</a></li>
      <li><a href="contact.html" class="active">Connect</a></li>
      <li>
        <button class="cart-icon-btn" aria-label="Open cart">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          Cart
          <span class="cart-badge">0</span>
        </button>
      </li>
    </ul>
  </nav>

  <!-- Cart Overlay & Drawer -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h2>Your Cart</h2>
      <button class="cart-close" id="cart-close">&#215; Close</button>
    </div>
    <div class="cart-drawer-items"></div>
    <div class="cart-drawer-footer">
      <div class="cart-total">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amount">€0.00</span>
      </div>
      <button class="cart-checkout-btn" onclick="alert('Stripe integration coming soon!')">Proceed to Checkout</button>
    </div>
  </div>

  <!-- MAIN SPLIT LAYOUT -->
  <div class="connect-wrap">

    <!-- LEFT — Portrait -->
    <div class="connect-photo">
      <img id="connect-portrait" src="" alt="Marie Hartig" />
    </div>

    <!-- RIGHT — Connect info -->
    <div class="connect-info">
      <div class="connect-rule"></div>
      <h1 class="connect-heading" id="connect-heading">Connect</h1>

      <!-- Social links -->
      <div class="connect-socials" id="connect-socials"></div>

      <!-- Newsletter -->
      <div class="connect-newsletter-label">Subscribe to Our Newsletter</div>
      <div class="connect-newsletter-form">
        <input type="email" placeholder="Email" />
        <button type="submit">Sign Up</button>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="connect-footer">
    <span><a href="about-marie.html">About Marie</a> &nbsp;|&nbsp; <a href="#">Terms of Service</a></span>
    <span>© All Rights Reserved 2026. Marie Hartig Studio</span>
  </footer>

  <script>
    fetch('../_content/contact.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('connect-heading').textContent = data.heading || 'Connect';
        document.getElementById('connect-portrait').src = data.portrait;

        const links = [];
        if (data.instagram_handle && data.instagram_url) {
          links.push(`<a href="${data.instagram_url}" target="_blank" rel="noopener">${data.instagram_handle}</a>`);
        }
        if (data.instagram_url) {
          links.push(`<a href="${data.instagram_url}" target="_blank" rel="noopener">Instagram</a>`);
        }
        if (data.facebook_url) {
          links.push(`<a href="${data.facebook_url}" target="_blank" rel="noopener">Facebook</a>`);
        }
        if (data.email) {
          links.push(`<a href="mailto:${data.email}">${data.email}</a>`);
        }
        if (data.phone) {
          links.push(`<a href="tel:${data.phone.replace(/[^+\d]/g, '')}">${data.phone}</a>`);
        }
        document.getElementById('connect-socials').innerHTML = links.join('<span class="sep">|</span>');
      });
  </script>
  <script src="../js/cart.js"></script>
  <script src="../js/nav.js"></script>
</body>
</html>
