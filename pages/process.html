<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Process — Marie Hartig Studio" />
  <title>The Process — Marie Hartig Studio</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/worlds.css" />
  <link rel="stylesheet" href="../css/meet-marie.css" />
  <link rel="stylesheet" href="../css/cart.css" />

  <style>
    /* ============================================
       PROCESS PAGE — follows meet-marie layout
       ============================================ */

    .process-section {
      display: flex;
      gap: 2vw;
      height: calc(100vh - 64px - 4vw);
      margin: 2vw 2vw;
    }

    .process-photo {
      flex: 0 0 42%;
      width: 42%;
      max-width: 42%;
      background: #ddd8d0;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    .process-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .process-text {
      flex: 1;
      background: #dedad3;
      display: flex;
      align-items: center;
      padding: 4vw 6vw;
      border-top: 1px solid rgba(0,0,0,0.07);
      overflow-y: auto;
    }

    @media (min-width: 901px) {
      .process-text {
        align-items: flex-start;
        padding-top: 5vw;
      }

      .process-section.photo-right {
        flex-direction: row-reverse;
      }
    }

    .process-text-inner {
      max-width: 560px;
    }

    .process-rule {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.18);
      margin-bottom: 1.6rem;
    }

    .process-heading {
      font-family: 'Velour', serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 2.6vw, 2.4rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 1.2rem;
      line-height: 1.1;
    }

    .process-body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.72rem, 0.85vw, 0.82rem);
      line-height: 1.55;
      color: #333;
      margin-bottom: 0.85rem;
    }

    .process-body:last-child { margin-bottom: 0; }

    /* Timeline steps */
    .process-steps {
      margin-top: 1.6rem;
    }

    .process-step {
      display: flex;
      align-items: flex-start;
      gap: 1.1rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .process-step:first-child {
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    .step-num {
      font-family: 'Velour', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: rgba(0,0,0,0.3);
      min-width: 1.7rem;
      padding-top: 0.1rem;
      flex-shrink: 0;
    }

    .step-title {
      font-family: 'Velour', serif;
      font-weight: 500;
      font-size: clamp(0.7rem, 0.85vw, 0.78rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 0.3rem;
    }

    .step-desc {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.72rem, 0.85vw, 0.8rem);
      line-height: 1.5;
      color: #555;
    }

    /* Investment bullet list */
    .process-list {
      list-style: none;
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .process-list li {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.72rem, 0.85vw, 0.82rem);
      line-height: 1.5;
      color: #333;
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
    }

    .process-list li::before {
      content: '—';
      color: rgba(0,0,0,0.3);
      flex-shrink: 0;
      font-weight: 200;
    }

    .price-from {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      margin-top: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .price-figure {
      font-family: 'Velour', serif;
      font-weight: 300;
      font-size: clamp(1.9rem, 3vw, 3rem);
      letter-spacing: 0.02em;
      color: #111;
      line-height: 1;
    }

    .section-divider {
      display: none;
    }

    @media (max-width: 900px) {
      .process-section {
        flex-direction: column;
        gap: 0;
        height: auto;
        margin: 0;
      }
      .process-photo {
        flex: none;
        width: 100%;
        max-width: 100%;
        height: 65vw;
        min-height: 300px;
      }
      .process-section.photo-right {
        flex-direction: column;
      }
      .process-text {
        padding: 10vw 8vw;
      }
    }

  </style>
</head>
<body class="worlds-page meet-marie-page">

  <!-- NAVIGATION -->
  <nav class="nav" aria-label="Main navigation">
    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <span class="nav-toggle-bar"><span></span><span></span><span></span></span>
    </button>
    <a class="nav-logo" href="../index.html">Marie's Painted Worlds</a>
    <ul class="nav-links">
      <li><a href="about-marie.html">About Marie</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="process.html" class="active">Process</a></li>
      <li><a href="contact.html">Connect</a></li>
      <li>
        <button class="cart-icon-btn" aria-label="Open cart">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          Cart
          <span class="cart-badge">0</span>
        </button>
      </li>
    </ul>
  </nav>

  <!-- Cart Overlay & Drawer -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h2>Your Cart</h2>
      <button class="cart-close" id="cart-close">&#215; Close</button>
    </div>
    <div class="cart-drawer-items"></div>
    <div class="cart-drawer-footer">
      <div class="cart-total">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amount">€0.00</span>
      </div>
      <button class="cart-checkout-btn" onclick="alert('Stripe integration coming soon!')">Proceed to Checkout</button>
    </div>
  </div>

  <main id="process-main"></main>

  <!-- FOOTER -->
  <footer class="about-footer">
    <span class="about-footer-left">
      <a href="contact.html">Connect</a> | <a href="#">Terms of Service</a>
    </span>
    <span class="about-footer-right">© All Rights Reserved 2026. Marie Hartig Studio</span>
  </footer>

  <script>
    function stepText(item) { return typeof item === 'string' ? item : item.text; }

    fetch('../_content/process.json')
      .then(res => res.json())
      .then(data => {
        const hmw = data.how_marie_works || {};
        const proc = data.process || {};
        const inv = data.investment || {};

        document.getElementById('process-main').innerHTML = `
          <section class="process-section">
            <div class="process-photo">
              <img src="${hmw.photo}" alt="Marie at work" />
            </div>
            <div class="process-text">
              <div class="process-text-inner">
                <div class="process-rule"></div>
                <h1 class="process-heading">${hmw.heading || ''}</h1>
                ${(hmw.paragraphs || []).map(stepText).map(p => `<p class="process-body">${p}</p>`).join('')}
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <section class="process-section photo-right">
            <div class="process-photo">
              <img src="${proc.photo}" alt="Marie painting" />
            </div>
            <div class="process-text">
              <div class="process-text-inner">
                <div class="process-rule"></div>
                <h2 class="process-heading">${proc.heading || ''}</h2>
                <p class="process-body">${proc.intro || ''}</p>
                <div class="process-steps">
                  ${(proc.steps || []).map(stepText).map((step, i) => `
                    <div class="process-step">
                      <span class="step-num">${String(i + 1).padStart(2, '0')}</span>
                      <div><p class="step-desc">${step}</p></div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <section class="process-section">
            <div class="process-photo">
              <img src="${inv.photo}" alt="Finished wall painting" />
            </div>
            <div class="process-text">
              <div class="process-text-inner">
                <div class="process-rule"></div>
                <h2 class="process-heading">${inv.heading || ''}</h2>
                <p class="process-body">${inv.intro || ''}</p>
                <ul class="process-list">
                  ${(inv.points || []).map(stepText).map(point => `<li>${point}</li>`).join('')}
                </ul>
              </div>
            </div>
          </section>
        `;
      });
  </script>
  <script src="../js/cart.js"></script>
  <script src="../js/nav.js"></script>
</body>
</html>
